<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiPDF Chat Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root{
            --bg-primary:#0f172a;
            --bg-secondary:#1e293b;
            --bg-chat:#111827;
            --user-msg:#2563eb;
            --bot-msg:#334155;
            --border:#334155;
            --text:#f8fafc;
        }
        body{
            background:var(--bg-primary);
            color:var(--text);
            height:100vh;
            overflow:hidden;
        }
        .sidebar{
            background:var(--bg-secondary);
            height:100vh;
            border-right:1px solid var(--border);
            padding:20px;
        }
        .chat-container{
            height:100vh;
            display:flex;
            flex-direction:column;
            background:var(--bg-chat);
        }
        .chat-header{
            padding:15px 25px;
            border-bottom:1px solid var(--border);
            font-size:1.2rem;
            font-weight:600;
        }
        .chat-body{
            flex:1;
            overflow-y:auto;
            padding:20px;
        }
        .chat-footer{
            padding:15px;
            border-top:1px solid var(--border);
        }
        .chat-message{
            display:flex;
            margin-bottom:20px;
            align-items:flex-start;
        }
        .chat-message.user{
            justify-content:flex-end;
        }
        .chat-message.bot{
            justify-content:flex-start;
        }
        .avatar{
            width:50px;
            height:50px;
            margin-right:12px;
        }
        .avatar img{
            width:100%;
            height:100%;
            border-radius:50%;
            object-fit:cover;
        }
        .message{
            max-width:75%;
            padding:14px 18px;
            border-radius:15px;
            line-height:1.6;
            word-wrap:break-word;
        }
        .user .message{
            background:var(--user-msg);
            color:white;
        }
        .bot .message{
            background:var(--bot-msg);
            color:white;
        }
        .pdf-list{
            max-height:300px;
            overflow-y:auto;
        }
        .pdf-item{
            background:#334155;
            padding:10px;
            border-radius:8px;
            margin-bottom:10px;
            font-size:14px;
        }
        .form-control,
        .form-control:focus{
            background:#1e293b;
            color:white;
            border:1px solid #475569;
            box-shadow:none;
        }
        .form-control::placeholder{
            color:#94a3b8;
        }
        .btn-primary{
            background:#2563eb;
            border:none;
        }
        .btn-primary:hover{
            background:#1d4ed8;
        }
        .upload-card{
            background:#334155;
            padding:15px;
            border-radius:10px;
        }
        .brand{
            font-size:1.5rem;
            font-weight:700;
            margin-bottom:20px;
        }

        @media(max-width:768px){
            .sidebar{
                height:auto;
            }
            body{
                overflow:auto;
            }
            .chat-container{
                height:auto;
            }
            .message{
                max-width:90%;
            }
        }
    </style>
</head>

<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar">
            <div class="brand">MultiPDF Chat</div>
            <div class="upload-card">
                <h6>Upload PDFs</h6>
                <form action="/upload" method="POST" enctype="multipart/form-data">
                    <input type="file" class="form-control mb-3" name="pdf_docs" multiple accept=".pdf">
                    <button class="btn btn-primary w-100" type="submit">Process Documents</button>
                </form>
            </div>
            <hr>

            <h6>Uploaded Files</h6>
            <div class="pdf-list">
                {% for pdf in pdf_files %}
                <div class="pdf-item">{{ pdf }}</div>
                {% endfor %}
            </div>
        </div>

        <div class="col-md-9 p-0">
            <div class="chat-container">
                <div class="chat-header">Ask Questions About Your PDFs</div>
                <div class="chat-body" id="chatBody">
                    {% for chat in chat_history %}
                    <div class="chat-message user">
                        <div class="message">{{ chat.question }}</div>
                    </div>
                    <div class="chat-message bot">
                        <div class="avatar"><img src="https://i.ibb.co/cN0nmSj/Screenshot-2023-05-28-at-02-37-21.png"></div>
                        <div class="message">{{ chat.answer }}</div>
                    </div>
                    {% endfor %}
                </div>
                <div class="chat-footer">
                    <form action="/ask" method="POST">
                        <div class="input-group">
                            <input type="text" name="question" class="form-control" placeholder="Ask a question about your PDFs..." required>
                            <button class="btn btn-primary" type="submit">Send</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
const chatBody = document.getElementById("chatBody");
if(chatBody){
    chatBody.scrollTop = chatBody.scrollHeight;
}
</script>
</body>
</html>
